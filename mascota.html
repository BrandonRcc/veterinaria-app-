<div class="container">

  <!-- SIDEBAR -->

  <!-- CONTENIDO -->
  <div class="content">

    <h2>Registrar Mascota</h2>

    <div class="form-container">

      <!-- FORMULARIO -->
      <div class="form-box">

        <label>Nombre</label>
        <input type="text" placeholder="Nombre">

        <label>Edad</label>
        <input type="number" placeholder="Edad">

        <label>Raza</label>
        <input type="text" placeholder="Raza">

        <label>Tipo</label>
        <select>
          <option>Perro</option>
          <option>Gato</option>
        </select>

        <label>Foto (opcional)</label>
        <input type="file">

        <div class="buttons">
          <button class="cancel">Cancelar</button>
          <button>Guardar</button>
        </div>

      </div>

      <!-- IMAGEN -->
    <div class="form-image">

  <div class="pets">
    <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="perro">
    <img src="https://cdn-icons-png.flaticon.com/512/616/616430.png" alt="gato">
  </div>

</div>

  </div>

</div>
